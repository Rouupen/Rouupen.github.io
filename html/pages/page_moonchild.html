<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="project.moonchild.title" class="project-title"></title>
    <link rel="icon" href="../../icons/icon.svg?v=1" type="image/svg+xml">

    <!-- CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- PRISM -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-clike.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-csharp.min.js"></script>

    <!-- Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
</head>

<body>

    <div id="header"></div>

    <!-- BG -->
    <video autoplay muted loop playsinline poster="https://res.cloudinary.com/iaubh7gg/image/upload/v1783279830/moonchild_poster_qs9yev.jpg" id="bg-video">
        <source src="https://res.cloudinary.com/iaubh7gg/video/upload/v1783279843/moonchild_bg_gradient_2k_30fps_pq17to.webm" type="video/webm">
        <source src="../../vids/moonchild/moonchild_bg_gradient_2k_30fps.webm" type="video/webm">
    </video>

    <div class="container_project">
        <section class="project-page">

            <!-- Header -->
            <div class="project-header">
                <h1 data-i18n="project.moonchild.title" class="project-title"></h1>

                <p data-i18n="project.moonchild.subtitle.software.used" class="project-subtitle"></p>
                <p data-i18n="project.moonchild.subtitle.languages.used" class="project-subtitle"></p>
                <p data-i18n="project.moonchild.subtitle.project.type" class="project-subtitle"></p>
                <p data-i18n="project.moonchild.subtitle.project.duration" class="project-subtitle"></p>

                <div class="externalLinks">
                    <a class="linkButton" href="https://dynami-studios.itch.io/moon-child" target="_blank"
                        rel="noopener noreferrer">
                        <img src="../../icons/itchio.svg">
                    </a>
                </div>
            </div>


            <!-- Project description -->
            <div class="project-description">
                <p data-i18n="project.moonchild.about.one" style="white-space: pre-line;"></p>
            </div>

            <!-- VIDEO -->
            <div class="project-video">
                <iframe src="https://www.youtube.com/embed/w7XexCPZXoY" title="YouTube video" allowfullscreen></iframe>
                <!-- Description -->
                <div class="project-video-description">
                    <p data-i18n="project.moonchild.video.description"></p>
                </div>
            </div>

            <!-- Project description -->
            <div class="project-description">
                <p data-i18n="project.moonchild.about.two" style="white-space: pre-line;"></p>
                <img id="professorEmail" data-i18n-img src="/imgs/moonchild/moonchild_mail_en.png" alt="Professor Feedback" style="max-width: 100%; height: auto; border-radius: 8px;">
            </div>

        </section>
    </div>
    <div id="footer"></div>
    <script src="../../js/script.js"></script>
</body>

</html>
