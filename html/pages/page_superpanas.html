<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="project.superpanas.title" class="project-title"></title>
    <link rel="icon" href="../../icons/icon.svg?v=1" type="image/svg+xml">

    <!-- CSS -->
    <link rel="stylesheet" href="../../css/main.css">

    <!-- PRISM -->

<body>

        <source src="https://res.cloudinary.com/iaubh7gg/video/upload/v1783279843/superpanas_bg_gradient_2k_30fps_gfzjnb.webm" type="video/webm">

    </video>

    <div class="container_project">

                <p data-i18n="project.superpanas.subtitle.software.used" class="project-subtitle"></p>

                    <a class="linkButton" href="https://superpanas.itch.io/super-panas" target="_blank"

                    </a>
                </div>
            </div>

            <!-- Project description -->
            <div class="project-description">
                <p data-i18n="project.superpanas.about.one" style="white-space: pre-line;"></p>
            </div>

            <!-- Video -->
            <div class="project-video">
                <iframe src="https://www.youtube.com/embed/x00GBPeSIYg" title="YouTube video" allowfullscreen></iframe>
                <!-- Description -->
                <div class="project-video-description">
                    <p data-i18n="project.superpanas.video.description"></p>
                </div>
            </div>

            <!-- Project description -->
            <div class="project-description">
                <p data-i18n="project.superpanas.about.two" style="white-space: pre-line;"></p>

    <div id="footer"></div>
    <script src="../../js/script.js"></script>

</html>
